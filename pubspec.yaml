name: learnquest
description: LearnQuest - Gamified Career Guidance for Students
version: 1.0.0+1
publish_to: none

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Firebase ──────────────────────────────────────────────────────────────
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  google_sign_in: ^6.2.1

  # ── State management ──────────────────────────────────────────────────────
  flutter_riverpod: ^2.5.1

  # ── Local storage ─────────────────────────────────────────────────────────
  shared_preferences: ^2.2.2

  # ── UI ────────────────────────────────────────────────────────────────────
  flutter_animate: ^4.5.0
  google_fonts: ^6.1.0
  cupertino_icons: ^1.0.6
  webview_flutter: ^4.13.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/artifacts/

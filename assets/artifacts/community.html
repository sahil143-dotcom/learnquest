<!doctype html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Community Hub</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f6f8ff; color: #20263d; }
    .wrap { padding: 16px; }
    .card { background: #fff; border: 1px solid #e7ebff; border-radius: 14px; padding: 14px; margin-bottom: 10px; }
    .muted { color: #68708c; font-size: 13px; }
    .title { font-weight: 700; margin-bottom: 6px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="title">Community Learning Hub</div>
      <div class="muted">This artifact is available in full native mode in Flutter for best UX.</div>
    </div>
    <div class="card">
      <div class="title">Leaderboard</div>
      <div class="muted">Compare XP rankings and keep your streak active.</div>
    </div>
    <div class="card">
      <div class="title">Study Groups</div>
      <div class="muted">Join focused groups and collaborate on projects.</div>
    </div>
  </div>
</body>
</html>

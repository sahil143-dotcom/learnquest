<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LearnQuest Dashboard</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #121733; color: #f3f6ff; }
    .wrap { padding: 16px; }
    .card { background: #1a2144; border: 1px solid #303a72; border-radius: 16px; padding: 14px; margin-bottom: 12px; }
    .row { display: flex; justify-content: space-between; align-items: center; }
    .muted { color: #b7c0ea; font-size: 13px; }
    .title { font-size: 22px; margin: 0 0 6px 0; }
    .bar { width: 100%; height: 10px; border-radius: 8px; background: #313967; overflow: hidden; margin-top: 8px; }
    .fill { height: 100%; width: 72%; background: linear-gradient(90deg, #7d7bff, #23d8ea); }
    button { margin-top: 12px; border: 0; border-radius: 10px; background: #6c63ff; color: #fff; padding: 10px 14px; font-weight: 700; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="row">
        <h2 class="title">LearnQuest Daily</h2>
        <span id="date" class="muted"></span>
      </div>
      <div class="muted" id="hello">Welcome back</div>
    </div>
    <div class="card">
      <div class="row">
        <div>Experience</div>
        <div id="level">Level 1</div>
      </div>
      <div class="muted" id="xp">0 XP</div>
      <div class="bar"><div class="fill"></div></div>
      <button onclick="Flutter.postMessage('xp:25')">Mark session complete (+25 XP)</button>
    </div>
  </div>
  <script>
    const data = window.LEARNQUEST_DATA || {};
    document.getElementById('date').textContent = new Date().toDateString();
    document.getElementById('hello').textContent = `Hey ${data.userName || 'Learner'}, keep your streak going.`;
    document.getElementById('level').textContent = `Level ${data.level || 1}`;
    document.getElementById('xp').textContent = `${data.xp || 0} XP`;
  </script>
</body>
</html>
